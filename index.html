<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Ryan! ⚡</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d8f3dc, #b7e4c7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #2d3748;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            transition: all 0.5s ease;
        }

        h1, h2 {
            color: #1b4332;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            min-height: 100px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #2d6a4f;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #718096;
            color: white;
            position: relative;
            z-index: 999;
        }

        .gifts-grid {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .gift-box {
            background: #40916c;
            color: white;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .gift-box:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .gift-box.opened {
            background: #95d5b2;
            transform: scale(0.9);
            cursor: default;
        }

        .para-display {
            min-height: 100px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.5;
            display: none;
        }

        .photo-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 25px 0;
        }

        .photo-gallery img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-color: #cbd5e0;
        }

        .final-wish {
            font-size: 26px;
            font-weight: 800;
            color: #1b4332;
            margin-top: 30px;
            animation: pulse 1.5s infinite;
        }

        .hidden {
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="screen1" class="container">
        <h1>Will u enjoy ur birthday?????</h1>
        <div class="btn-container" id="btnContainer">
            <button id="yesBtn" onclick="goToScreen2()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <div id="screen2" class="container hidden">
        <h2>Click the boxes to unlock ur texts ykyk 👀</h2>
        <p style="font-size: 14px; color: #666;">Open all 3 boxes to read the message!</p>
        
        <div class="gifts-grid">
            <div class="gift-box" id="gift1" onclick="openGift(1)">🎁</div>
            <div class="gift-box" id="gift2" onclick="openGift(2)">🎁</div>
            <div class="gift-box" id="gift3" onclick="openGift(3)">🎁</div>
        </div>

        <div id="paraText" class="para-display"></div>

        <button id="nextBtn" class="hidden" onclick="goToScreen3()" style="background: #2d6a4f; color: white; margin-top: 20px;">Next →</button>
    </div>

    <div id="screen3" class="container hidden">
        <h1>LY SM MOMMY EHEHEHHEE🤝</h1>
        
        <div class="photo-gallery">
            <img src="Images/Screenshot_20260619-222422_Gallery.jpg" alt="Memory 1">
            <img src="Images/Screenshot_20260619-222523_Gallery.jpg" alt="Memory 2">
            <img src="Images/Screenshot_20260619-222622_Gallery.jpg" alt="Memory 3">
        </div>

        <div class="final-wish">
            HAVE THE HAPPIEST BIRTHDAY RYANNNN!⚡
        </div>
    </div>

    <script>
        const paragraphs = [
            "Happy 15th birthday Ryan! crazy to think ur finally 15 now dynamic is shifting fr lol. just wanted to reach out and say ur a real one and easily one of the best friends to chill with. always appreciate the solid energy u bring whenever we hang out ykyk.",
            "ur literally hilarious and always keep it lowkey chill, and talking to u is always light. i can genuinely count on u whenever we need to clear our heads, play something, or just talk about random stuff. glad we became friends fr.",
            "now that ur 15 u gotta make sure this year goes crazy. hope today brings u absolute top tier vibes, plenty of food, and everything u wanted to get because u deserve a huge day. don't let anyone kill the mood today standard rules apply haha.",
            "just wanted to say i've always got ur back bro. looking forward to making way more memories together as we keep growing up. hope u enjoy ur special day to the absolute max. HAVE THE HAPPIEST BIRTHDAY RYANNNN!⚡"
        ];

        const boxContent = [
            paragraphs[0],
            paragraphs[1],
            `${paragraphs[2]}<br><br>${paragraphs[3]}`
        ];

        let openedGifts = new Set();

        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            let randomX = Math.floor(Math.random() * maxX);
            let randomY = Math.floor(Math.random() * maxY);
            
            randomX = Math.max(padding, randomX);
            randomY = Math.max(padding, randomY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function goToScreen2() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }

        function openGift(boxNum) {
            const gift = document.getElementById(`gift${boxNum}`);
            const display = document.getElementById('paraText');
            
            if (!gift.classList.contains('opened')) {
                gift.classList.add('opened');
                gift.innerText = '✨';
                openedGifts.add(boxNum);
            }

            display.style.display = 'block';
            display.innerHTML = boxContent[boxNum - 1];

            if (openedGifts.size === 3) {
                document.getElementById('nextBtn').classList.remove('hidden');
            }
        }

        function goToScreen3() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
